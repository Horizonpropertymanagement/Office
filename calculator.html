<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon — Quote Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e2; padding: 32px; width: 100%; max-width: 480px; }
  .logo { font-size: 13px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 24px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  select, input[type=number] { width: 100%; height: 40px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; padding: 0 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
  select:focus, input[type=number]:focus { border-color: #1a1a1a; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  hr { border: none; border-top: 1px solid #f0f0ee; margin: 24px 0; }
  .result { background: #f5f5f3; border-radius: 12px; padding: 20px 24px; }
  .result-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .result-price { font-size: 40px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .result-breakdown { font-size: 13px; color: #888; }
  .rate-note { font-size: 12px; color: #aaa; margin-top: 16px; }
  .copy-btn { margin-top: 20px; width: 100%; height: 40px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .copy-btn:hover { background: #f5f5f3; }
  .copy-btn:active { background: #ececea; }
  .copied { color: #2d7d46; border-color: #2d7d46; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Horizon Property Management</div>
  <h1>Quote Calculator</h1>

  <div class="field">
    <label>Service type</label>
    <select id="serviceType" onchange="toggleFields(); calc()">
      <option value="general">General / Trimming / Cleanup</option>
      <option value="garden">Garden services</option>
      <option value="edging">Edging (per linear foot)</option>
    </select>
  </div>

  <div id="hoursSection">
    <div class="row">
      <div class="field">
        <label>Hours estimated</label>
        <input type="number" id="hours" value="2" min="0.5" step="0.5" oninput="calc()" />
      </div>
      <div class="field">
        <label>People on crew</label>
        <input type="number" id="crew" value="1" min="1" step="1" oninput="calc()" />
      </div>
    </div>
  </div>

  <div id="linearSection" style="display:none;">
    <div class="field">
      <label>Linear feet</label>
      <input type="number" id="linearFt" value="50" min="1" step="1" oninput="calc()" />
    </div>
  </div>

  <hr>

  <div class="result">
    <div class="result-label">Quote price</div>
    <div class="result-price" id="resultPrice">$150.00</div>
    <div class="result-breakdown" id="resultBreakdown">2 hrs × 1 person × $75/hr</div>
  </div>

  <div class="rate-note" id="rateNote">Rate: $75/hr (general)</div>

  <button class="copy-btn" id="copyBtn" onclick="copyPrice()">Copy price</button>
</div>

<script>
const RATES = { general: 75, garden: 60, edging: 2.95 };

function toggleFields() {
  const type = document.getElementById('serviceType').value;
  document.getElementById('hoursSection').style.display = type === 'edging' ? 'none' : 'block';
  document.getElementById('linearSection').style.display = type === 'edging' ? 'block' : 'none';
}

function calc() {
  const type = document.getElementById('serviceType').value;
  let price, breakdown, note;

  if (type === 'edging') {
    const ft = parseFloat(document.getElementById('linearFt').value) || 0;
    price = ft * 2.95;
    breakdown = ft + ' linear ft × $2.95/ft';
    note = 'Rate: $2.95/linear ft (edging)';
  } else {
    const rate = RATES[type];
    const hours = parseFloat(document.getElementById('hours').value) || 0;
    const crew = parseInt(document.getElementById('crew').value) || 1;
    price = hours * crew * rate;
    breakdown = hours + ' hrs × ' + crew + ' person' + (crew > 1 ? 's' : '') + ' × $' + rate + '/hr';
    note = 'Rate: $' + rate + '/hr (' + (type === 'garden' ? 'garden' : 'general') + ')';
  }

  document.getElementById('resultPrice').textContent = '$' + price.toFixed(2);
  document.getElementById('resultBreakdown').textContent = breakdown;
  document.getElementById('rateNote').textContent = note;

  const btn = document.getElementById('copyBtn');
  btn.classList.remove('copied');
  btn.textContent = 'Copy price';
  btn._price = price.toFixed(2);
}

function copyPrice() {
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(btn._price).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy price'; btn.classList.remove('copied'); }, 2000);
  });
}

calc();
</script>
</body>
</html>
